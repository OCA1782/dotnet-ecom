services:
  # ── PostgreSQL (primary database) ─────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: EcomDb
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER zorunludur}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD zorunludur}
    volumes:
      - pgdata:/var/lib/postgresql/data
    command: >
      postgres
      -c shared_buffers=512MB
      -c work_mem=32MB
      -c effective_cache_size=4GB
      -c maintenance_work_mem=128MB
      -c max_connections=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d EcomDb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── SQL Server — DISABLED (PostgreSQL is primary; ECOM-0181) ──────────────
  # To re-enable: uncomment and add profile "mssql" removal, then set SA_PASSWORD.
  # db:
  #   image: mcr.microsoft.com/mssql/server:2022-latest
  #   profiles: ["mssql"]
  #   environment:
  #     SA_PASSWORD: ${SA_PASSWORD}
  #     ACCEPT_EULA: "Y"
  #     MSSQL_PID: "Express"
  #   ports:
  #     - "127.0.0.1:1433:1433"
  #   volumes:
  #     - sqldata:/var/opt/mssql
  #   healthcheck:
  #     test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${SA_PASSWORD}\" -Q 'SELECT 1' -C"]
  #     interval: 15s
  #     timeout: 10s
  #     retries: 10
  #     start_period: 30s

  redis:
    image: redis:7-alpine
    # no public ports — internal Docker network only
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "127.0.0.1:5673:5672"
      - "127.0.0.1:15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:?RABBITMQ_USERNAME required}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD required}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  licence:
    build:
      context: ../EcomLicence
      dockerfile: Dockerfile
    ports:
      - "${DOCKER_HOST_IP:-127.0.0.1}:15125:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=EcomLicenceDb;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};SSL Mode=Disable;
      - LICENCE_SERVICE_KEY=${LICENCE_SERVICE_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${DOCKER_HOST_IP:-127.0.0.1}:15124:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - Database__Provider=PostgreSQL
      - ConnectionStrings__PostgreSQL=Host=postgres;Port=5432;Database=EcomDb;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};SSL Mode=Disable;
      - Jwt__Key=${JWT_KEY:?JWT_KEY zorunludur}
      - Jwt__Issuer=EcomAPI
      - Jwt__Audience=EcomClient
      - Seed__AdminEmail=${SEED_ADMIN_EMAIL:-admin@ecom.com}
      - Seed__AdminPassword=${SEED_ADMIN_PASSWORD:?SEED_ADMIN_PASSWORD zorunludur}
      - AllowedOrigins__0=${ALLOWED_ORIGIN_0:-http://localhost:3000}
      - AllowedOrigins__1=${ALLOWED_ORIGIN_1:-http://localhost:3001}
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=${RABBITMQ_USERNAME:?RABBITMQ_USERNAME required}
      - RabbitMQ__Password=${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD required}
      - ConnectionStrings__Redis=redis:6379
      - ECOM_LICENSE=${ECOM_LICENSE:-}
      - ECOM_PUBLIC_KEY=${ECOM_PUBLIC_KEY:-}
      - LICENSE_ACTIVATION_URL=${LICENSE_ACTIVATION_URL:-}
      - Cloudinary__Url=${CLOUDINARY_URL:-}
      - Storage__PublicBaseUrl=${STORAGE_PUBLIC_BASE_URL:-}
      - FrontendUrls__CustomerUrl=http://customer:3000
      - FrontendUrls__AdminUrl=http://admin:3001
      - Docs__LocalPath=/app/docs
      - GitHub__Token=${GITHUB_TOKEN:-}
      - GitHub__Owner=OCA1782
      - GitHub__Repo=dotnet-ecom-docs
      - GitHub__DocsPath=
      - LicenceService__BaseUrl=http://licence:8080
      - LICENCE_SERVICE_KEY=${LICENCE_SERVICE_KEY:-}
    volumes:
      - uploads:/app/wwwroot/uploads
      - docs:/app/docs
      - /opt/ecom/.git:/app/.git:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      licence:
        condition: service_started
    restart: unless-stopped

  customer:
    build:
      context: ./frontend/customer
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5124}
    ports:
      - "${DOCKER_HOST_IP:-127.0.0.1}:13000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:5124}
      - INTERNAL_API_URL=http://api:8080
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  admin:
    build:
      context: ./frontend/admin
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5124}
    ports:
      - "${DOCKER_HOST_IP:-127.0.0.1}:13001:3001"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:5124}
      - PORT=3001
      - INTERNAL_API_URL=http://api:8080
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
  docs:
  # sqldata: — removed with MSSQL passivation (ECOM-0181)
