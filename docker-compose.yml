services:
  redis:
    image: redis:7-alpine
    # no public ports — internal Docker network only
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:?RABBITMQ_USERNAME required}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD required}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: ${SA_PASSWORD:?SA_PASSWORD zorunludur}
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "127.0.0.1:1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    deploy:
      resources:
        limits:
          memory: ${MSSQL_MEMORY_LIMIT_MB:-1500}m
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${SA_PASSWORD}\" -Q 'SELECT 1' -C"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:15124:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - ConnectionStrings__DefaultConnection=Server=db;Database=EcomDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=true
      - Jwt__Key=${JWT_KEY:?JWT_KEY zorunludur}
      - Jwt__Issuer=EcomAPI
      - Jwt__Audience=EcomClient
      - Seed__AdminEmail=${SEED_ADMIN_EMAIL:-admin@ecom.com}
      - Seed__AdminPassword=${SEED_ADMIN_PASSWORD:?SEED_ADMIN_PASSWORD zorunludur}
      - AllowedOrigins__0=${ALLOWED_ORIGIN_0:-http://localhost:3000}
      - AllowedOrigins__1=${ALLOWED_ORIGIN_1:-http://localhost:3001}
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=${RABBITMQ_USERNAME:?RABBITMQ_USERNAME required}
      - RabbitMQ__Password=${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD required}
      - ConnectionStrings__Redis=redis:6379
      - ECOM_LICENSE=${ECOM_LICENSE:-}
      - Cloudinary__Url=${CLOUDINARY_URL:-}
      - FrontendUrls__CustomerUrl=http://customer:3000
      - FrontendUrls__AdminUrl=http://admin:3001
      - Docs__LocalPath=/app/docs
      - GitHub__Token=${GITHUB_TOKEN:-}
      - GitHub__Owner=OCA1782
      - GitHub__Repo=dotnet-ecom-docs
      - GitHub__DocsPath=
    volumes:
      - uploads:/app/wwwroot/uploads
      - docs:/app/docs
      - /opt/ecom/.git:/app/.git:ro
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  customer:
    build:
      context: ./frontend/customer
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5124}
    ports:
      - "127.0.0.1:13000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:5124}
      - INTERNAL_API_URL=http://api:8080
    depends_on:
      - api
    restart: unless-stopped

  admin:
    build:
      context: ./frontend/admin
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5124}
    ports:
      - "127.0.0.1:13001:3001"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:5124}
      - PORT=3001
      - INTERNAL_API_URL=http://api:8080
    depends_on:
      - api
    restart: unless-stopped

volumes:
  sqldata:
  uploads:
  docs:
