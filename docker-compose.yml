services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "Ecom_Docker_2024!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Ecom_Docker_2024!' -Q 'SELECT 1' -C"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=db;Database=EcomDb;User Id=sa;Password=Ecom_Docker_2024!;TrustServerCertificate=True;MultipleActiveResultSets=true
      - Jwt__Key=CHANGE_THIS_TO_A_STRONG_SECRET_KEY_AT_LEAST_32_CHARS
      - Jwt__Issuer=EcomAPI
      - Jwt__Audience=EcomClient
      - Seed__AdminEmail=admin@ecom.com
      - Seed__AdminPassword=Admin1234!
      - AllowedOrigins__0=http://localhost:3000
      - AllowedOrigins__1=http://localhost:3001
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  customer:
    build:
      context: ./frontend/customer
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      - api
    restart: unless-stopped

  admin:
    build:
      context: ./frontend/admin
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
      - PORT=3001
    depends_on:
      - api
    restart: unless-stopped

volumes:
  sqldata:
