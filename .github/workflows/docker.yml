name: Docker Build & Push

on:
  push:
    branches: [main]
    tags: ["v*"]

# Gerekli secrets (GitHub repo → Settings → Secrets and variables → Actions):
#   REGISTRY_URL   — örn. ghcr.io veya docker.io
#   REGISTRY_USER  — kullanıcı adı
#   REGISTRY_TOKEN — access token / PAT

jobs:
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    strategy:
      matrix:
        include:
          - context: ./backend
            image: api
          - context: ./frontend/customer
            image: customer
          - context: ./frontend/admin
            image: admin

    steps:
      - uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.REGISTRY_URL }}/${{ secrets.REGISTRY_USER }}/ecom-${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
